<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Effort Graph</title>
    <link rel="icon" href="data:," />
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #020617;
      }

      #shader-background {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
      }

      #app {
        position: relative;
        z-index: 1;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        box-sizing: border-box;
      }

      .graph-scene {
        width: 100%;
        height: 100%;
      }

      .nav-controls {
        position: fixed;
        right: max(8px, env(safe-area-inset-right));
        bottom: max(8px, env(safe-area-inset-bottom));
        z-index: 2;
        display: flex;
        gap: 6px;
      }

      .nav-button {
        width: 34px;
        height: 34px;
        padding: 0;
        border-radius: 8px;
        border: 1px solid transparent;
        outline: none;
        background: transparent;
        color: #000;
        font-size: 1rem;
        line-height: 1;
        font-weight: 700;
        cursor: pointer;
        box-shadow: none;
        transition:
          background-color 120ms ease,
          border-color 120ms ease,
          outline-color 120ms ease,
          transform 80ms ease;
      }

      .nav-button-icon {
        width: 15px;
        height: 15px;
        object-fit: contain;
        pointer-events: none;
        filter: brightness(0) saturate(100%);
      }

      .nav-button:hover {
        background: rgba(255, 255, 255, 0.92);
        border-color: rgba(0, 0, 0, 0.75);
        outline: 1px solid rgba(0, 0, 0, 0.75);
      }

      .nav-button:active {
        background: rgba(255, 255, 255, 1);
        border-color: rgba(0, 0, 0, 0.95);
        outline: 1px solid rgba(0, 0, 0, 0.95);
        transform: translateY(1px);
      }

      .nav-button:focus-visible {
        background: rgba(255, 255, 255, 0.96);
        border-color: rgba(0, 0, 0, 0.85);
        outline: 1px solid rgba(0, 0, 0, 0.85);
      }
    </style>
  </head>
  <body>
    <div id="shader-background"></div>
    <main id="app"></main>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
