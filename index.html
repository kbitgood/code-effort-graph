<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Effort Graph</title>
    <link rel="icon" href="data:," />
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #020617;
      }

      #shader-background {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
      }

      #app {
        position: relative;
        z-index: 1;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        box-sizing: border-box;
      }

      .graph-scene {
        width: 100%;
        height: 100%;
      }

      .nav-controls {
        position: fixed;
        right: 20px;
        bottom: 20px;
        z-index: 2;
        display: flex;
        gap: 10px;
      }

      .nav-button {
        border: 1px solid rgba(15, 23, 42, 0.35);
        background: #fff;
        color: #000;
        padding: 8px 12px;
        border-radius: 10px;
        font-size: 0.95rem;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 4px 18px rgba(15, 23, 42, 0.18);
        transition:
          background-color 120ms ease,
          border-color 120ms ease,
          transform 80ms ease;
      }

      .nav-button:hover {
        background: #f3f4f6;
        border-color: rgba(15, 23, 42, 0.45);
      }

      .nav-button:active {
        background: #e5e7eb;
        transform: translateY(1px);
      }
    </style>
  </head>
  <body>
    <div id="shader-background"></div>
    <main id="app"></main>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
